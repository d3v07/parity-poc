# Render blueprint — one static-site preview per generated PoC.
# Declarative only; Render provisions a per-PR preview on push. No API calls.
services:
  - type: web
    name: parity-poc-5368
    runtime: static
    rootDir: apps/5368
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
